Section "ServerLayout"
    Identifier "Layout"
    Option "BlankTime" "5"
    Option "StandbyTime" "10"
    Option "SuspendTime" "15"
    Option "OffTime" "20"
    Option "Xinerama" "on"
    Option "DRI2" "on"
EndSection

Section "OutputClass"
    Identifier "AMDgpu"
    MatchDriver "amdgpu"
    Option "AccelMethod" "glamor"
    Option "TearFree" "true"
    Option "DRI" "3"
    Option "ColorTiling" "on"
    Option "ColorTiling2D" "on"
EndSection

Section "OutputClass"
    Identifier "Radeon"
    MatchDriver "radeon"
    Option "AccelMethod" "glamor"
    Option "TearFree" "true"
    Option "DRI" "3"
    Option "ColorTiling" "on"
    Option "ColorTiling2D" "on"
EndSection

Section "InputClass"
    Identifier "keyboard"
    MatchDriver "libinput"
    MatchIsKeyboard "on"
    Option "XkbLayout" "us"
EndSection

Section "InputClass"
    Identifier "mouse"
    MatchDriver "libinput"
    MatchIsPointer "on"
    Option "AccelProfile" "adaptive"
    Option "AccelSpeed" "0.3"
EndSection

Section "InputClass"
    Identifier "touchpad"
    MatchDriver "libinput"
    MatchIsTouchpad "on"
    Option "Tapping" "on"
    Option "HorizontalScrolling" "true"
    Option "ScrollMethod" "twofinger"
    Option "TappingButtonMap" "lmr"
    Option "NaturalScrolling" "true"
    Option "AccelProfile" "adaptive"
    Option "AccelSpeed" "0.3"
    Option "DisableWhileTyping" "true"
EndSection
